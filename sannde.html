<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>簡易スカルプトサイト</title>
<style>
  body { margin: 0; overflow: hidden; }
  #ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
  button { margin: 2px; }
</style>
</head>
<body>
<div id="ui">
  <button onclick="addCube()">直方体</button>
  <button onclick="addPyramid()">三角錐</button>
  <button onclick="addSphere()">球</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.153.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0xaaaaaa);
let camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls = new THREE.OrbitControls(camera, renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

let objects = []; // 追加したメッシュ管理

// 形状追加関数
function addCube(){
    let geometry = new THREE.BoxGeometry(1,1,1,10,10,10);
    addMesh(geometry);
}

function addPyramid(){
    let geometry = new THREE.ConeGeometry(1,1.5,4,10);
    addMesh(geometry);
}

function addSphere(){
    let geometry = new THREE.SphereGeometry(0.7,20,20);
    addMesh(geometry);
}

function addMesh(geometry){
    let material = new THREE.MeshStandardMaterial({color: 0x44aa88, flatShading:true});
    let mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(Math.random()-0.5, 0, Math.random()-0.5);
    scene.add(mesh);
    objects.push(mesh);
}

// スカルプト（押し/引き）
// Raycasterでクリックした頂点を移動
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let isMouseDown = false;

function onMouseDown(e){ isMouseDown=true; updateMouse(e); }
function onMouseUp(e){ isMouseDown=false; }
function onMouseMove(e){ if(isMouseDown) updateMouse(e); }

function updateMouse(e){
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    for(let obj of objects){
        let intersects = raycaster.intersectObject(obj);
        if(intersects.length>0){
            let point = intersects[0].point;
            let pos = obj.geometry.attributes.position;
            for(let i=0;i<pos.count;i++){
                let vx=pos.getX(i), vy=pos.getY(i), vz=pos.getZ(i);
                let dist = Math.sqrt((vx+obj.position.x - point.x)**2 + (vy+obj.position.y - point.y)**2 + (vz+obj.position.z - point.z)**2);
                if(dist<0.3){
                    let delta = (e.buttons===1 ? 0.02 : -0.02); // 左クリックで押し、右クリックで引く
                    pos.setXYZ(i, vx, vy+delta, vz);
                }
            }
            pos.needsUpdate = true;
        }
    }
}

window.addEventListener('mousedown', onMouseDown);
window.addEventListener('mouseup', onMouseUp);
window.addEventListener('mousemove', onMouseMove);

window.addEventListener('resize', ()=> {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
